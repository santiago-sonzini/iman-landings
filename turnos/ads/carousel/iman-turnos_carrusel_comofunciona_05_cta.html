<!DOCTYPE html><meta charset="utf-8">
<title>carrusel cta</title>
<link rel="stylesheet" href="../brand.css">

<style>.mag.big{margin:0 auto 34px}.endcta{display:flex;flex-direction:column;align-items:center;gap:22px}</style>
<body>
<div class="stage p1350 bg-acento">
  <div class="pagedot" style="background:var(--crema);color:var(--tinta)">5 / 5</div>
  <span class="shape disc" style="width:360px;height:360px;background:var(--acento-osc);opacity:.6;top:-130px;right:-130px"></span>
  <span class="shape star" style="font-size:64px;color:var(--crema);bottom:12%;left:9%;opacity:.5">✦</span>
  <div class="endcta">
    <div class="mag big flota on-solid">
      <div class="out"></div><div class="hs" style="border-color:var(--amarillo)"></div><div class="inn"></div>
      <div class="leg l"></div><div class="leg r"></div>
      <div class="parts"><span class="part p1">✂️</span><span class="part p2">💈</span><span class="part p3">🪒</span></div>
    </div>
    <h1 class="small on-dark">Probá gratis con<br>tus propios clientes</h1>
    <div class="cta amber">Registrarte gratis</div>
    <div class="url on-dark" style="color:var(--crema)">iman.ar/turnos · sin comisiones · en pesos</div>
  </div>
</div>
