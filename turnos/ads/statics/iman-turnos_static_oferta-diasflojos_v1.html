<!DOCTYPE html><meta charset="utf-8">
<title>oferta-diasflojos</title>
<link rel="stylesheet" href="../brand.css">
<link rel="stylesheet" href="../../css/app.css">
<link rel="stylesheet" href="../../css/booking.css">
<link rel="stylesheet" href="../lib/ui-extra.css">
<link rel="stylesheet" href="../lib/ui-embed.css">
<style>
  .stage{justify-content:center}
  h1{margin-top:34px}
  .crop{margin-top:54px}
  .featrow{margin-top:38px}
  .p1080 h1{font-size:60px}.p1080 .crop{margin-top:40px}.p1080 .featrow{display:none}
</style>
<body>
<div class="stage p1350 bg-crema" id="stage">
  <span class="shape disc" style="width:340px;height:340px;background:var(--acento-suave);top:-120px;left:-120px"></span>
  <span class="shape star" style="font-size:60px;color:var(--acento);bottom:8%;right:9%">✦</span>
  <div class="eyebrow eb-acento">🗓️ Martes y miércoles</div>
  <h1 class="small on-light">Llená los días<br><span class="hl hl-amber">flojos</span></h1>
  <div class="crop" data-ui="crop-promo"></div>
  <div class="featrow"><span class="feat"><span class="em">🎁</span> Con un incentivo</span>
    <span class="feat"><span class="em">⏱️</span> Y un countdown</span></div>
  <div class="foot">La promo aparece sola en tu link los días de menos gente. · pantalla real</div>
</div>
<script src="../lib/ui-fragments.js"></script>
<script>(function(){if(new URLSearchParams(location.search).get('f')==='sq'){var s=document.getElementById('stage');s.classList.replace('p1350','p1080');}})();</script>
